name: Agent Nightly Autonomous Cycle

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  autonomous-cycle:
    runs-on: ubuntu-latest
    env:
      CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Codex CLI
        run: npm i -g @openai/codex

      - name: Bootstrap common dependencies
        run: bash agentops/scripts/stack_bootstrap.sh

      - name: Run autonomous agent cycle
        run: bash agentops/scripts/run_unattended_codex.sh

      - name: Create pull request when changes exist
        uses: peter-evans/create-pull-request@v6
        with:
          branch: agent/autonomous-cycle-${{ github.run_id }}
          title: "Autonomous agent cycle: ${{ github.run_id }}"
          commit-message: "Run autonomous agent cycle"
          body: |
            This PR was generated by the bounded autonomous agent loop.

            Review before merge. Check `agentops/reports/` and `agentops/REFLECTIONS.md` for the run summary, tests, risks, and blockers.
          labels: |
            agent-generated
            needs-review
